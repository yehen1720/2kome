<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My App</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    button { font-size: 18px; padding: 12px 18px; margin-right: 8px; }
    #decrement { background: #1976d2; color: #fff; border: none; }
    #btn { background: #1976d2; color: #fff; border: none; }
    #reset { background: #1976d2; color: #fff; border: none; }
  </style>
</head>

<body>
  <h1>MEX</h1>
  <div style="margin-top:16px;">
    <p>カウント：<span id="count">0</span></p>
    <button id="decrement">-1</button>
    <button id="btn">+1</button>
    <button id="reset">リセット</button>
  </div>

  <script>
    let n = 0;

    const countEl = document.getElementById("count");
    const decrementEl = document.getElementById("decrement");
    const btnEl = document.getElementById("btn");
    const resetEl = document.getElementById("reset");

    decrementEl.addEventListener("click", () => {
      n--;
      countEl.textContent = n;
    });

    btnEl.addEventListener("click", () => {
      n++;
      countEl.textContent = n;
    });

    resetEl.addEventListener("click", () => {
      n = 0;
      countEl.textContent = n;
    });
  </script>
</body>
</html>
